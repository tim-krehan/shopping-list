kubernetesClusterDomain: cluster.local
ingress:
  enabled: false
  ingressClassName: nginx
  host: shopping-list.example.com
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    # external-dns.alpha.kubernetes.io/hostname: shopping-list.example.com
    # cert-manager.io/cluster-issuer: intermediate-ca-issuer
    # cert-manager.io/duration: 2160h
    # cert-manager.io/renew-before: 360h
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/ssl-passthrough: "true"
route:
  enabled: false
  apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  annotations: {}
  labels: {}
  hostnames:
    - shopping-list.example.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external-gateway
      namespace: traefik
      sectionName: websecure
  https: false
  filters: []

mysql:
  mysql:
    env:
      lang: C.UTF-8
      tz: Europe/Berlin
    image:
      repository: mysql
      tag: latest
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 128Mi
  ports:
  - port: 3306
    protocol: TCP
    targetPort: 3306
  replicas: 1
  type: ClusterIP
mysqlSecret:
  # the secret must contain the keys MYSQL_DATABASE, MYSQL_PASSWORD, MYSQL_ROOT_PASSWORD, and MYSQL_USER
  existingSecret: ""
  # these values are used to create the secret, if existingSecret is not set
  mysqlDatabase: "shopping-list"
  mysqlPassword: "P4$$w0rd"
  mysqlRootPassword: "R00tP4$$w0rd"
  mysqlUser: "shopper"
pvc:
  mysqlPvc:
    storageRequest: 1Gi
shoppingList:
  replicas: 1
  shoppingList:
    image:
      repository: ghcr.io/tim-krehan/shopping-list
      tag: v0.2.11
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
